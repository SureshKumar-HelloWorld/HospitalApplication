server:
  port: 8082
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/patientdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

app:
  jwt:
    secret: changeitchangeitchangeit1234
    expiration-ms: 3600000

management:
  endpoints:
    web:
      exposure:
        include: "*"
  tracing:
    sampling:
      probability: 1.0
  otlp:
    traces:
      endpoint: http://otel-collector:4317
      protocol: http/protobuf
  metrics:
    export:
      prometheus:
        enabled: true
