apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: health-insurance
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          http:
          grpc:
    processors:
      batch:
    exporters:
      logging:
        loglevel: info
      jaeger:
        endpoint: "http://jaeger:14250"
        tls:
          insecure: true
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [logging, jaeger]
