apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: health-insurance
spec:
  ports:
    - port: 16686
      targetPort: 16686
      name: query
    - port: 14250
      targetPort: 14250
      name: grpc
  selector:
    app: jaeger
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: health-insurance
spec:
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.48
          ports:
            - containerPort: 16686
            - containerPort: 14250
